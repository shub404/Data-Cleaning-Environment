name: data-cleaning-env
description: RL environment for cleaning messy tabular datasets

version: 1.0

entrypoint: server.app:app

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [remove_duplicates, fill_missing, normalize_text, done]
    column:
      type: string
      nullable: true

observation_space:
  type: object
  properties:
    data_preview:
      type: array
      items:
        type: object
    issues:
      type: array
      items:
        type: string

reward_range: [0.01, 0.99]

tasks:
  - id: easy
    name: easy
    description: "Remove duplicate rows and fix simple missing values"
    grader:
      type: reward
  - id: medium
    name: medium
    description: "Handle missing values, casing inconsistencies, and duplicates"
    grader:
      type: reward
  - id: hard
    name: hard
    description: "Fully clean complex dataset with mixed formats, outliers and missing data"
    grader:
      type: reward